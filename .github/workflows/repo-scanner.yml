name: Code Analysis

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Repo Scanner
        uses: yaseen-vm/repo_scanner@master
        id: scanner
        with:
          mimo_api_key: ${{ secrets.MIMO_API_KEY }}
          severity_threshold: medium
          max_files: 50
          create_issues: true
          post_comment: true
          ignore_patterns: "**/node_modules/**,**/dist/**,**/*.lock,**/*.lockb,**/public/**"

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-scanner-report
          path: |
            /tmp/repo-scanner-report.md
            /tmp/repo-scanner-report.json

  fix:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: scan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "repo-scanner[bot]"
          git config user.email "repo-scanner[bot]@users.noreply.github.com"

      - name: Repo Scanner Fix
        uses: yaseen-vm/repo_scanner@master
        with:
          mimo_api_key: ${{ secrets.MIMO_API_KEY }}
          github_token: ${{ secrets.FIX_TOKEN }}
          mode: fix
          max_fixes: "3"
          severity_threshold: high
