name: Code Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repo Scanner
        uses: yaseen-vm/repo_scanner@master
        id: scanner
        with:
          mimo_api_key: ${{ secrets.MIMO_API_KEY }}
          severity_threshold: medium
          max_files: 50
          create_issues: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          post_comment: ${{ github.event_name == 'pull_request' }}
          ignore_patterns: "**/node_modules/**,**/dist/**,**/*.lock,**/*.lockb,**/public/**"

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-scanner-report
          path: |
            /tmp/repo-scanner-report.md
            /tmp/repo-scanner-report.json

      - name: Report issue count
        if: always()
        run: echo "Found ${{ steps.scanner.outputs.total_issues }} issue(s)"
